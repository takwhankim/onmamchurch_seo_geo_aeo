<style>
  :root {
    --bg: #f4efe6;
    --paper: #fffdf8;
    --ink: #1f2937;
    --muted: #6b7280;
    --line: #e8dccb;
    --brand: #a54c2b;
    --brand-soft: #f4d8c8;
    --good: #2f7d4a;
    --warn: #c17a14;
    --bad: #b42318;
    --shadow: 0 18px 40px rgba(80, 49, 27, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Pretendard", "Noto Sans KR", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(165, 76, 43, 0.10), transparent 26%),
      linear-gradient(180deg, #f9f5ef 0%, var(--bg) 100%);
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  .shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 20px 48px;
  }

  .hero,
  .panel,
  .stat-card {
    background: rgba(255, 253, 248, 0.9);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(232, 220, 203, 0.95);
    box-shadow: var(--shadow);
  }

  .hero {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    align-items: flex-end;
    border-radius: 28px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .eyebrow,
  .panel-head p,
  .subtitle,
  .dialog-label {
    color: var(--muted);
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  h1 {
    margin-top: 8px;
    font-size: clamp(2rem, 4vw, 3.4rem);
    line-height: 1;
  }

  .subtitle {
    margin-top: 12px;
    max-width: 660px;
    line-height: 1.6;
  }

  .hero-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    border-radius: 22px;
    padding: 20px;
  }

  .stat-card strong {
    display: block;
    font-size: 2rem;
    margin: 12px 0 4px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  .panel {
    border-radius: 26px;
    padding: 24px;
  }

  .panel-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 18px;
  }

  .panel-tools input,
  .form-grid input,
  .dialog-body input,
  .dialog-body textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    background: #fff;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .form-grid label,
  .dialog-body label {
    display: grid;
    gap: 8px;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .form-grid button {
    align-self: end;
    height: 48px;
  }

  button {
    border: 0;
    border-radius: 999px;
    padding: 0 18px;
    min-height: 44px;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  button:hover {
    transform: translateY(-1px);
  }

  button:disabled {
    opacity: 0.6;
    cursor: wait;
    transform: none;
  }

  .primary {
    background: var(--brand);
    color: white;
  }

  .secondary {
    background: #1f4b47;
    color: white;
  }

  .ghost {
    background: #f8eee3;
    color: var(--ink);
  }

  .table-wrap {
    overflow: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 960px;
  }

  th,
  td {
    padding: 14px 10px;
    border-bottom: 1px solid var(--line);
    text-align: left;
    vertical-align: middle;
  }

  thead th {
    color: var(--muted);
    font-size: 0.92rem;
    font-weight: 600;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    padding: 6px 10px;
    font-size: 0.82rem;
    font-weight: 700;
  }

  .badge.overdue {
    color: var(--bad);
    background: #fee4e2;
  }

  .badge.today {
    color: var(--warn);
    background: #fff1d6;
  }

  .badge.upcoming {
    color: #915f00;
    background: #fff5cc;
  }

  .badge.normal {
    color: var(--good);
    background: #dcfae6;
  }

  .member-name {
    font-weight: 700;
  }

  .empty-state,
  .empty-row {
    color: var(--muted);
  }

  .visit-list {
    display: grid;
    gap: 12px;
  }

  .visit-item {
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px 16px;
    background: #fff;
  }

  .visit-item strong {
    display: block;
    margin-bottom: 4px;
  }

  dialog {
    border: 0;
    border-radius: 24px;
    padding: 0;
    width: min(92vw, 460px);
    box-shadow: var(--shadow);
  }

  dialog::backdrop {
    background: rgba(31, 41, 55, 0.35);
  }

  .dialog-body {
    display: grid;
    gap: 14px;
    padding: 24px;
  }

  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .helper {
    color: var(--muted);
    font-size: 0.85rem;
  }

  @media (max-width: 920px) {
    .stats,
    .grid,
    .form-grid {
      grid-template-columns: 1fr;
    }

    .hero {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
